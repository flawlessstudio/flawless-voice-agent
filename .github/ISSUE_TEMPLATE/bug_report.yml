name: Bug Report
description: Report a bug or unexpected behaviour
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start server with `npm run dev`
        2. Call the Twilio number
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "e.g. 20.12.0"

  - type: dropdown
    id: agent_path
    attributes:
      label: AGENT_PATH
      options: [fast, deep, fallback]
