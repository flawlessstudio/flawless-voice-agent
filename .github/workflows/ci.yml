name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: lockfile drift ────────────────────────────────────────────────────
  lockfile:
    name: Lockfile drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install (ignore-scripts for speed)
        run: npm ci --ignore-scripts

      - name: Detect drift
        run: |
          npm install --package-lock-only --ignore-scripts 2>/dev/null
          git diff --exit-code package-lock.json || \
            (echo '::error::package-lock.json is out of sync with package.json — run npm install and commit the result' && exit 1)

  # ── Job 2: lint + typecheck + test + build ───────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    needs: lockfile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test with coverage
        run: npm test -- --passWithNoTests --coverage
        env:
          NODE_ENV: test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Build
        run: npm run build

  # ── Job 3: npm audit (non-blocking, informational) ───────────────────────────
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    needs: lockfile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Audit production deps
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true   # informational until baseline is clean
