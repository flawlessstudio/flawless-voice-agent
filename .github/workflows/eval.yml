name: Eval

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'prompts/**'
      - 'eval/**'

jobs:
  eval-smoke:
    name: Eval Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run eval:smoke
        env:
          EVAL_MODE: 'true'
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  eval-regression:
    name: Eval Regression Suite
    runs-on: ubuntu-latest
    needs: [eval-smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run eval:regression
        env:
          EVAL_MODE: 'true'
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - name: Upload scorecard
        uses: actions/upload-artifact@v4
        with:
          name: eval-scorecard
          path: eval/reports/
